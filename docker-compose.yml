services:
  postgres:
    image: postgres:16
    container_name: realtor_postgres
    restart: always
    environment:
      POSTGRES_USER: realtor_user
      POSTGRES_PASSWORD: realtor_password
      POSTGRES_DB: realtor_db
    ports:
      - "5432:5432"
    volumes:
      - realtor_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: realtor_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@realtor.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"

volumes:
  realtor_postgres_data:
